<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Physics Playground (CDN)</title>
    
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/cannon.js"></script>
    <script src="https://tamats.com/projects/litegraph/build/litegraph.min.js"></script>
    <link rel="stylesheet" href="https://tamats.com/projects/litegraph/css/litegraph.css">
    
    <style>
        body, html { margin:0; padding:0; height:100%; overflow:hidden; background: #000; }
        #canvas3d { width: 100%; height: 50%; display: block; }
        #canvasGraph { width: 100%; height: 50%; display: block; touch-action: none; }
        #toolbar { position: absolute; top: 52%; left: 10px; z-index: 100; }
        button { padding: 12px 20px; font-size: 16px; background: #007AFF; color: white; border: none; border-radius: 8px; }
    </style>
</head>
<body>

    <canvas id="canvas3d"></canvas>
    <canvas id="canvasGraph"></canvas>
    <div id="toolbar">
        <button onclick="addExecNode()">Add Exec</button>
    </div>

    <script>
        window.addEventListener('load', () => {
            if (typeof LGraph === 'undefined' || typeof BABYLON === 'undefined') {
                alert("ライブラリの読み込みに失敗しました。電波状況を確認してください。");
                return;
            }

            // --- LiteGraphの初期化 ---
            const graph = new LGraph();
            const canvasGraph = new LGraphCanvas("#canvasGraph", graph);
            canvasGraph.capture_touch = true; // iPadのタッチ対応

            // 解像度ズレの補正
            const gCanvas = document.getElementById("canvasGraph");
            gCanvas.width = gCanvas.clientWidth * window.devicePixelRatio;
            gCanvas.height = gCanvas.clientHeight * window.devicePixelRatio;
            canvasGraph.resize();
            
  // --- LiteGraphの初期化 ---
const graph = new LGraph();
const canvasGraph = new LGraphCanvas("#canvasGraph", graph);
canvasGraph.capture_touch = true; // タッチキャプチャを有効化

// 【追加】iPad Safariのタッチ操作を完全にLiteGraphに紐付ける修正
const gCanvas = document.getElementById("canvasGraph");

// 1. CSSでブラウザのデフォルト挙動（スクロール・ズーム）を完全にオフにする
gCanvas.style.touchAction = "none";
gCanvas.style.webkitUserSelect = "none";

// 2. タッチイベントが発生した際、ブラウザのスクロールを防止してLiteGraphに処理を渡す
const preventDefault = (e) => { if (e.cancelable) e.preventDefault(); };
gCanvas.addEventListener('touchstart', preventDefault, { passive: false });
gCanvas.addEventListener('touchmove', preventDefault, { passive: false });

// 解像度ズレの補正
gCanvas.width = gCanvas.clientWidth * window.devicePixelRatio;
gCanvas.height = gCanvas.clientHeight * window.devicePixelRatio;
canvasGraph.resize();


            // --- Babylon.jsの初期化 ---
            const canvas3d = document.getElementById("canvas3d");
            const engine = new BABYLON.Engine(canvas3d, true);
            const scene = new BABYLON.Scene(engine);
            
            // 物理エンジン（Cannon.js）の有効化
            scene.enablePhysics(new BABYLON.Vector3(0, -9.81, 0), new BABYLON.CannonJSPlugin());

            // カメラ・ライト・地面
            const camera = new BABYLON.ArcRotateCamera("cam", 0, 1, 15, BABYLON.Vector3.Zero(), scene);
            camera.attachControl(canvas3d, true);
            new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0,1,0), scene);
            
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 10, height: 10}, scene);
            ground.physicsImpostor = new BABYLON.PhysicsImpostor(ground, BABYLON.PhysicsImpostor.BoxImpostor, {mass: 0}, scene);

            engine.runRenderLoop(() => scene.render());

            // --- カスタムノードの定義 ---
            function ExecNode() {
                this.addInput("In", "");
                this.addWidget("button", "▶️ Run", null, () => {
                    // ボタンを押したら3D空間に箱を落とす
                    const box = BABYLON.MeshBuilder.CreateBox("box", {size: 1}, scene);
                    box.position.y = 7;
                    box.physicsImpostor = new BABYLON.PhysicsImpostor(box, BABYLON.PhysicsImpostor.BoxImpostor, {mass: 1}, scene);
                });
            }
            ExecNode.title = "Execute";
            LiteGraph.registerNodeType("game/execute", ExecNode);

            // ボタン連動用の関数をグローバルに登録
            window.addExecNode = function() {
                const node = LiteGraph.createNode("game/execute");
                node.pos = [60, 60];
                graph.add(node);
            };

            graph.start();

            // リサイズ処理
            window.addEventListener("resize", () => {
                engine.resize();
                canvasGraph.resize();
            });
        });
    </script>
</body>
</html>
