<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Physics Playground</title>
    
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/cannon.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/litegraph.js/0.7.35/litegraph.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/litegraph.js/0.7.35/css/litegraph.min.css">

    <style>
        body, html { margin:0; padding:0; height:100%; overflow:hidden; touch-action: none; background: #000; }
        #canvas3d { width: 100%; height: 50%; display: block; }
        #canvasGraph { width: 100%; height: 50%; display: block; }
        #toolbar { position:absolute; top:55%; left:10px; z-index:100; }
        button { padding: 10px; background: #444; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <canvas id="canvas3d"></canvas>
    <canvas id="canvasGraph"></canvas>
    
    <div id="toolbar">
        <button onclick="addNode('game/execute')">Add Exec</button>
    </div>

    <script>
        // 1. LiteGraphの初期化
        const graph = new LGraph();
        const canvasGraph = new LGraphCanvas("#canvasGraph", graph);

        // 2. Babylon.jsの初期化
        const canvas3d = document.getElementById("canvas3d");
        const engine = new BABYLON.Engine(canvas3d, true);
        const scene = new BABYLON.Scene(engine);
        scene.enablePhysics(new BABYLON.Vector3(0, -9.81, 0), new BABYLON.CannonJSPlugin());
        const camera = new BABYLON.ArcRotateCamera("cam", 0, 1, 15, BABYLON.Vector3.Zero(), scene);
        camera.attachControl(canvas3d, true);
        new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0,1,0), scene);
        const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 10, height: 10}, scene);
        ground.physicsImpostor = new BABYLON.PhysicsImpostor(ground, BABYLON.PhysicsImpostor.BoxImpostor, {mass: 0}, scene);
        
        engine.runRenderLoop(() => scene.render());

        // 3. ノード定義
        function ExecNode() {
            this.addWidget("button", "▶️ Run", null, () => {
                const box = BABYLON.MeshBuilder.CreateBox("box", {size: 1}, scene);
                box.position.y = 5;
                box.physicsImpostor = new BABYLON.PhysicsImpostor(box, BABYLON.PhysicsImpostor.BoxImpostor, {mass: 1}, scene);
            });
        }
        ExecNode.title = "Execute";
        LiteGraph.registerNodeType("game/execute", ExecNode);

        // 4. ノード追加関数
        function addNode(type) {
            const node = LiteGraph.createNode(type);
            node.pos = [100, 100];
            graph.add(node);
        }

        // 画面サイズ調整
        window.addEventListener("resize", () => {
            engine.resize();
            canvasGraph.resize();
        });
        
        graph.start();
    </script>
</body>
</html>
